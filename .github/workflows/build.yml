name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build TinyPDF
        run: xcodebuild clean build -project TinyPDF.xcodeproj -scheme TinyPDF -configuration Release -derivedDataPath /tmp/tinybuild/tinypdf CODE_SIGN_IDENTITY="-"
